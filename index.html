<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WAYN Games — Documentation</title>
  <meta name="description" content="Documentation hub for WAYN Games open-source packages.">
  <link rel="icon" href="https://avatars.githubusercontent.com/u/269321351?v=4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/homepage.css">
  <script>
    // Apply theme before render to prevent flash
    (function () {
      var stored = localStorage.getItem('forge-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <img class="logo" src="https://avatars.githubusercontent.com/u/269321351?v=4" alt="">
    <p class="site-title">WAYN Games Documentation</p>
    <button type="button" id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle dark mode">
      <span class="theme-icon theme-icon-light" aria-hidden="true">&#9790;</span>
      <span class="theme-icon theme-icon-dark" aria-hidden="true">&#9788;</span>
    </button>
  </header>

  <main class="content">
    <h1>Documentation</h1>
    <p class="subtitle">Browse the docs for our packages.</p>

    <input type="text" id="package-search" class="search-bar" placeholder="Filter packages&hellip;" aria-label="Filter packages">

    <div id="package-grid" class="package-grid">
      <p class="loading">Loading packages&hellip;</p>
    </div>
  </main>

  <footer class="site-footer">
    <span>&copy; 2026 WAYN Games &ndash; All rights reserved.</span>
  </footer>

  <script>
    // Theme toggle
    (function () {
      var STORAGE_KEY = 'forge-theme';

      function getPreferred() {
        var stored = localStorage.getItem(STORAGE_KEY);
        if (stored) return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function apply(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem(STORAGE_KEY, theme);
      }

      apply(getPreferred());

      var btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme');
          apply(current === 'dark' ? 'light' : 'dark');
        });
      }

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
        if (!localStorage.getItem(STORAGE_KEY)) {
          apply(e.matches ? 'dark' : 'light');
        }
      });
    })();

    // Load packages and render cards
    (function () {
      var grid = document.getElementById('package-grid');
      var searchInput = document.getElementById('package-search');
      var allPackages = [];

      fetch('packages.json')
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (packages) {
          if (!packages.length) {
            grid.innerHTML = '<p class="error-state">No packages found.</p>';
            return;
          }

          allPackages = packages;
          renderCards(packages);
        })
        .catch(function () {
          grid.innerHTML = '<p class="error-state">Unable to load package list.</p>';
        });

      searchInput.addEventListener('input', function () {
        var q = this.value.toLowerCase();
        if (!q) { renderCards(allPackages); return; }
        var filtered = allPackages.filter(function (pkg) {
          var prodText = pkg.product ? humanize(pkg.product) : '';
          var tags = Array.isArray(pkg.tags) ? pkg.tags : [];
          var tagMatch = tags.some(function (t) { return humanize(t).toLowerCase().indexOf(q) !== -1; });
          return prodText.toLowerCase().indexOf(q) !== -1 ||
                 tagMatch ||
                 (pkg.title || pkg.name).toLowerCase().indexOf(q) !== -1 ||
                 (pkg.description || '').toLowerCase().indexOf(q) !== -1 ||
                 pkg.name.toLowerCase().indexOf(q) !== -1;
        });
        renderCards(filtered);
      });

      function renderCards(packages) {
        grid.innerHTML = '';
        if (!packages.length) {
          grid.innerHTML = '<p class="error-state">No matching packages.</p>';
          return;
        }
        packages.forEach(function (pkg) {
          var card = document.createElement('article');
          card.className = 'package-card';

          var product = pkg.product ? humanize(pkg.product) : (pkg.title || pkg.name);
          var tags = Array.isArray(pkg.tags) ? pkg.tags : [];
          var desc = pkg.description || '';
          var version = pkg.latestVersion || '';
          var author = pkg.author || '';
          var href = '/' + pkg.name + '/v' + version + '/index.html';

          var metaHtml = '';
          tags.forEach(function (tag) {
            metaHtml += '<span class="tag-badge">' + escapeHtml(humanize(tag)) + '</span>';
          });
          if (version) {
            metaHtml += '<span class="version-badge">v' + escapeHtml(version) + '</span>';
          }
          metaHtml += '<a class="view-link" href="' + escapeHtml(href) + '">View Docs &rarr;</a>';

          var authorHtml = author ? '<span class="author">' + escapeHtml(author) + '</span>' : '';

          var overlayHtml = desc
            ? '<div class="description-overlay">' +
                (metaHtml ? '<div class="meta">' + metaHtml + '</div>' : '') +
                '<h2>' + escapeHtml(product) + '</h2>' +
                '<p class="description" style="display:block;-webkit-line-clamp:unset;overflow:visible">' + escapeHtml(desc) + '</p>' +
                authorHtml +
              '</div>'
            : '';

          card.innerHTML =
            (metaHtml ? '<div class="meta">' + metaHtml + '</div>' : '') +
            '<h2>' + escapeHtml(product) + '</h2>' +
            '<p class="description">' + escapeHtml(desc) + '</p>' +
            authorHtml +
            overlayHtml;

          grid.appendChild(card);
        });

        // Mark cards whose description is clamped
        requestAnimationFrame(function () {
          var descs = grid.querySelectorAll('.package-card > .description');
          descs.forEach(function (el) {
            if (el.scrollHeight > el.clientHeight + 1) {
              el.closest('.package-card').classList.add('clamped');
            }
          });
        });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function humanize(str) {
        if (!str) return '';
        return str
          .replace(/-/g, ' ')
          .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
      }
    })();
  </script>
</body>
</html>

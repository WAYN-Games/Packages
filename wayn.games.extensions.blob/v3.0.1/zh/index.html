    <script>
    (function () {
      // Run once DOM is ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
      } else {
        run();
      }

      function run() {
        var toc = document.getElementById('toc');
        if (!toc) return;

        // Only change link *text* inside the TOC
        toc.querySelectorAll('a').forEach(function (a) {
          // Use textContent to avoid touching any existing HTML,
          // then re-inject with <wbr> after each dot.
          var t = a.textContent;
          if (!t || t.indexOf('.') === -1) return;
          a.innerHTML = t.replace(/\./g, '.<wbr>');
        });

        // Accessibility: hide decorative glyphicon loading spinner from screen readers
        document.querySelectorAll('.glyphicon.index-loading').forEach(function (el) {
          el.setAttribute('aria-hidden', 'true');
          var parent = el.closest('p');
          if (parent && !parent.textContent.trim().replace(el.textContent, '').trim()) {
            parent.setAttribute('aria-hidden', 'true');
          }
        });

        // Accessibility: remove title attributes that just repeat link text
        document.querySelectorAll('a[title]').forEach(function (a) {
          if (a.title.trim() === a.textContent.trim()) {
            a.removeAttribute('title');
          }
        });
      }
    })();

    <script>
      // Load versions.js from the output root, handling both EN and language sub-builds
      (function() {
        var vm = window.location.pathname.match(/\/v[\d.]+\//);
        var src = vm
          ? window.location.pathname.substring(0, vm.index + 1) + 'versions.js'
          : '../versions.js';
        document.write('<scr' + 'ipt src="' + src + '"><\/scr' + 'ipt>');
      })();
    </script>
    <script>
    (function () {
      var current = '3.0.1';
      var select = document.querySelector('#version-select');
      if (!select || !current) return;

      // Compute the output root from the URL (parent of vX.Y.Z/)
      var vMatch = window.location.pathname.match(/\/v[\d.]+\//);
      var outputRoot = vMatch
        ? window.location.pathname.substring(0, vMatch.index + 1)
        : '../';

      // Detect current language from URL
      var currentLang = 'en';
      if (vMatch) {
        var afterVer = window.location.pathname.substring(vMatch.index + vMatch[0].length);
        var seg = afterVer.split('/')[0];
        if (seg && seg.length >= 2 && seg.length <= 3 && seg !== 'api' && seg !== 'manual') {
          currentLang = seg;
        }
      }

      function buildDropdown(versions) {
        versions.forEach(function (v) {
          var opt = document.createElement('option');
          opt.textContent = 'Extensions Blob ' + v.version;
          if (v.version === current) {
            opt.selected = true;
          }
          opt.value = v.version;
          select.appendChild(opt);
        });

        select.addEventListener('change', function () {
          var newVer = select.value;
          if (!newVer) return;
          var base = outputRoot + 'v' + newVer + '/';

          if (currentLang === 'en') {
            window.location.href = base + 'index.html';
            return;
          }

          // Try the same language in the new version; fall back to EN
          var langUrl = base + currentLang + '/index.html';
          var xhr = new XMLHttpRequest();
          xhr.open('HEAD', langUrl, true);
          xhr.onload = function () {
            window.location.href = (xhr.status < 400) ? langUrl : base + 'index.html';
          };
          xhr.onerror = function () {
            window.location.href = base + 'index.html';
          };
          xhr.send();
        });
      }

      var versions = window.DOC_VERSIONS || [{ version: current }];
      buildDropdown(versions);
    })();
    </script>

    <script>
    (function () {
      var LANG_STORAGE_KEY = 'forge-lang';
      var select = document.querySelector('#language-select');
      var wrapper = select ? select.closest('.language-switcher') : null;
      if (!select || !wrapper) return;

      // Load languages.js from the version folder (version-specific).
      // For lang sub-builds (v0.4.0/zh/manual/...), compute the vX.Y.Z/ base.
      var script = document.createElement('script');
      var vMatch = window.location.pathname.match(/\/v[\d.]+\//);
      script.src = vMatch
        ? window.location.pathname.substring(0, vMatch.index + vMatch[0].length) + 'languages.js'
        : 'languages.js';
      script.onload = function () {
        var languages = window.DOC_LANGUAGES || [];
        if (languages.length <= 1) return; // Only English, keep hidden

        wrapper.classList.remove('hidden');

        // Detect current language from URL path
        // URL pattern: /package/vX.Y.Z/{lang}/manual/... or /package/vX.Y.Z/manual/...
        var path = window.location.pathname;
        var versionMatch = path.match(/\/v[\d.]+\//);
        var currentLang = 'en';
        if (versionMatch) {
          var afterVersion = path.substring(versionMatch.index + versionMatch[0].length);
          var langCodes = languages.map(function (l) { return l.code; });
          var firstSegment = afterVersion.split('/')[0];
          if (firstSegment && langCodes.indexOf(firstSegment) !== -1 && firstSegment !== 'en') {
            currentLang = firstSegment;
          }
        }

        // Populate dropdown
        languages.forEach(function (l) {
          var opt = document.createElement('option');
          opt.value = l.code;
          opt.textContent = l.name;
          if (l.code === currentLang) opt.selected = true;
          select.appendChild(opt);
        });

        // Handle language switch
        select.addEventListener('change', function () {
          var newLang = select.value;
          localStorage.setItem(LANG_STORAGE_KEY, newLang);

          if (!versionMatch) return;
          var beforeVersion = path.substring(0, versionMatch.index + versionMatch[0].length);
          var afterVersion = path.substring(versionMatch.index + versionMatch[0].length);

          // Strip current language prefix if present
          if (currentLang !== 'en') {
            afterVersion = afterVersion.substring(currentLang.length + 1); // remove "fr/"
          }

          // Add new language prefix (unless English)
          var newPath;
          if (newLang === 'en') {
            newPath = beforeVersion + afterVersion;
          } else {
            newPath = beforeVersion + newLang + '/' + afterVersion;
          }

          window.location.href = newPath;
        });
      };
      // If languages.js doesn't exist, keep the switcher hidden
      script.onerror = function () { /* no-op, switcher stays hidden */ };
      document.head.appendChild(script);
    })();
    </script>

    <script>
    (function () {
      var STORAGE_KEY = 'forge-theme';

      function getPreferred() {
        var stored = localStorage.getItem(STORAGE_KEY);
        if (stored) return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function apply(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem(STORAGE_KEY, theme);
      }

      // Apply immediately to avoid flash
      apply(getPreferred());

      // Wire up toggle button
      var btn = document.getElementById('theme-toggle');
      if (btn) {
        btn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme');
          apply(current === 'dark' ? 'light' : 'dark');
        });
      }

      // Respect OS-level changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
        if (!localStorage.getItem(STORAGE_KEY)) {
          apply(e.matches ? 'dark' : 'light');
        }
      });
    })();
    </script>

name: Bug report
description: Something doesn't work as documented
title: "[Bug] "
labels: ["type: bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        Before submitting, please:
        - Check existing issues to avoid duplicates
        - Make sure you're on a supported version of the package
        - **Do not paste WAYN Games package source code.** The packages are commercial products. Show your own code that *uses* the package, plus relevant stack traces from the Unity console — never the package's own files from `Runtime/`, `Editor/`, or `Tests/`.
        - **Do not include credentials, license keys, proprietary content, or personal data** — public issues are visible to everyone and indexed by search engines

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which WAYN Games package is affected?
      options:
        - mgm-character-controller
        - other (specify in description)
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Exact version (e.g. `0.6.0`). Find it in `package.json` or the Package Manager.
      placeholder: "0.6.0"
    validations:
      required: true

  - type: input
    id: unity-version
    attributes:
      label: Unity version
      description: e.g. `6000.0.32f1`
      placeholder: "6000.0.32f1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform(s)
      description: Where does the bug reproduce?
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - WebGL
        - Android
        - iOS
        - Other (specify in description)
    validations:
      required: true

  - type: dropdown
    id: build-mode
    attributes:
      label: Build mode
      description: When does the bug occur?
      options:
        - Editor (Play mode)
        - Development build
        - Release build
        - All of the above
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you observe?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal sequence of steps that reliably triggers the bug. A small reproduction project (link to a public repo) is ideal.
      placeholder: |
        1. Open scene X
        2. Press play
        3. Walk forward
        4. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output / stack trace
      description: Paste relevant Unity console logs. Wrap long output in `<details>` to keep the issue readable.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, videos, related issues, workarounds you've tried, etc.

name: Feature request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["type: feature-request", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!

        Please describe what you want and **why** before jumping to a solution. Understanding the underlying problem helps us pick the right approach.

        **Do not paste WAYN Games package source code in your proposal.** Describe the desired API in pseudo-code, plain English, or by referencing public documentation pages. The packages are commercial products and their internal code must not be redistributed in public issues.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which WAYN Games package would this affect?
      options:
        - mgm-character-controller
        - other (specify in description)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point. Start with the problem, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Mockups, API sketches, or pseudo-code are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you tried, or what other approaches did you reject and why?

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Related issues, prior art from other tools, links, references, etc.
